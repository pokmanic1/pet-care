    <script>
      // GitHub Pages SPA routing
      (function(l) {
        if (l.search[1] === "/") {
          var decoded = l.search.slice(1).split("0026").map(function(s) {
            return s.replace(/~and~/g, "0026");
          }).join("?");
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location));
    </script>
